[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "waterpolo"
version = "0.1.0"
description = "Water Polo Champions League data tools"
requires-python = ">=3.10"
readme = "README.md"
license = { text = "MIT" }
dependencies = [
  "pandas>=2.0",
  "sqlalchemy>=2.0",
  "pydantic>=2.6",
  "requests>=2.31",
  "typer>=0.12",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["waterpolo*"]

[project.scripts]
waterpolo = "waterpolo.scrape.cli:app"
