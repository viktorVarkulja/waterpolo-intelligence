services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: waterpolo
      POSTGRES_PASSWORD: waterpolo
      POSTGRES_DB: waterpolo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://waterpolo:waterpolo@db:5432/waterpolo
      CSV_DEFAULT_PATH: /data/match_data_correct.csv
      ADMIN_JWT_SECRET: change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      WATERPOLO_ENDPOINTS_PATH: /app/endpoints.json
    volumes:
      - ../apps/api:/app
      - ../packages/waterpolo:/app/packages/waterpolo
      - ../data:/data:ro
    depends_on:
      - db
    networks:
      - proxy
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.waterpolo-api.rule=Host(`waterpolo-api.localhost`)
      - traefik.http.routers.waterpolo-api.entrypoints=web
      - traefik.http.services.waterpolo-api.loadbalancer.server.port=8000

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    command: ["npm", "run", "dev", "--", "--webpack", "-H", "0.0.0.0", "-p", "3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://waterpolo-api.localhost
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      NEXT_WEBPACK_USEPOLLING: "1"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.waterpolo-web.rule=Host(`waterpolo.localhost`)
      - traefik.http.routers.waterpolo-web.entrypoints=web
      - traefik.http.services.waterpolo-web.loadbalancer.server.port=3000

volumes:
  db_data:

networks:
  proxy:
    external: true
